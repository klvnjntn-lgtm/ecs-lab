name: "ECS Destroy"

on:
  workflow_dispatch: # Manual button activation

jobs:
  terraform-destroy:
    name: "Terraform ECS Destroy"
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v4
        with:
          terraform_version: "latest"

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::304188066409:role/GitHubAction-Terraform-Role
          aws-region: ap-southeast-1

      # ==========================================
      # STEP 1: DESTROY ADDONS LAYER FIRST
      # ==========================================
      - name: Addons Layer - Init
        run: terraform -chdir=layers/addons init -input=false

      - name: Addons Layer - Destroy
        run: terraform -chdir=layers/addons destroy -auto-approve

      # ==========================================
      # STEP 2: DESTROY INFRA LAYER SECOND
      # ==========================================
      - name: Infra Layer - Init
        run: terraform -chdir=layers/infra init -input=false

      - name: Infra Layer - Destroy
        run: terraform -chdir=layers/infra destroy -auto-approve