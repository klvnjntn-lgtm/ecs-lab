name: "ECS Destroy"

on:
  workflow_dispatch: # This is the magic for the manual button

jobs:
  terraform-destroy:
    name: "Terraform ECS Destroy"
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # Fix: Added the HashiCorp setup action to bring the Terraform CLI into the runner's PATH
      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v4
        with:
          terraform_version: "latest" # Or pin a specific version like "1.14.6" to avoid surprises

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::304188066409:role/GitHubAction-Terraform-Role
          aws-region: ap-southeast-1

      - name: Terraform Init
        run: terraform init

      - name: Terraform Destroy
        run: terraform destroy -auto-approve