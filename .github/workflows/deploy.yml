name: "ECS Deploy"

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

jobs:
  terraform:
    name: "Terraform-ECS Deploy"
    runs-on: ubuntu-latest
    outputs:
      cluster_name: ${{ steps.set_output.outputs.ecs_cluster_name }}
      service_name: ${{ steps.set_output.outputs.ecs_service_name }}
      task_family: ${{ steps.set_output.outputs.ecs_task_definition_family }}
      container_name: ${{ steps.set_output.outputs.container_name }} 
      
    env:
      AWS_REGION: "ap-southeast-1"
      TF_VAR_availability_zones: '["ap-southeast-1a", "ap-southeast-1b"]'
      TF_VAR_public_subnet_cidrs: '["10.0.1.0/24", "10.0.2.0/24"]'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Checkov GitHub Action
        uses: bridgecrewio/checkov-action@master
        with:
          directory: layers/infra # Target the infra folder for security scans
          framework: terraform
          soft_fail: true 

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::304188066409:role/GitHubAction-Terraform-Role
          aws-region: ap-southeast-1

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      # --- 1. INFRA LAYER ---
      - name: Terraform Init (Infra)
        run: terraform -chdir=layers/infra init

      - name: Terraform Apply (Infra)
        run: terraform -chdir=layers/infra apply -auto-approve -input=false
        
      # Extract outputs directly from the infra state using -chdir
      - name: Export Outputs
        id: set_output
        run: |
          echo "ecs_cluster_name=$(terraform -chdir=layers/infra output -raw ecs_cluster_name)" >> $GITHUB_OUTPUT
          echo "ecs_service_name=$(terraform -chdir=layers/infra output -raw ecs_service_name)" >> $GITHUB_OUTPUT
          echo "ecs_task_definition_family=$(terraform -chdir=layers/infra output -raw ecs_task_definition_family)" >> $GITHUB_OUTPUT
          echo "container_name=$(terraform -chdir=layers/infra output -raw container_name)" >> $GITHUB_OUTPUT

      # --- 2. ADDONS LAYER ---
      - name: Terraform Init (Addons)
        run: terraform -chdir=layers/addons init
      
      # 🔴 ADD THIS STEP RIGHT HERE TO FORCE THE PIPELINE TO IMPORT THEM
      - name: Force State Import in Pipeline
        run: |
          terraform -chdir=layers/addons import aws_budgets_budget.monthly_limit 304188066409:monthly-cost-budget || true
          terraform -chdir=layers/addons import aws_iam_policy.enforce_mfa arn:aws:iam::304188066409:policy/EnforceMFAPolicy || true
          terraform -chdir=layers/addons import module.monitoring.aws_iam_role.lambda_exec Kelvin-Cloud-Project-lambda-role || true
          terraform -chdir=layers/addons import module.monitoring.aws_ssm_parameter.discord_webhook /Kelvin-Cloud-Project/discord-webhook || true
          terraform -chdir=layers/addons import module.monitoring.aws_lambda_function.discord_alert Kelvin-Cloud-Project-discord-notifier || true

      - name: Terraform Apply (Addons)
        run: terraform -chdir=layers/addons apply -auto-approve -input=false

  deploy:
    name: "Build & Deploy"
    runs-on: ubuntu-latest
    needs: terraform
    env:
      CLUSTER_NAME: ${{ needs.terraform.outputs.cluster_name }}
      SERVICE_NAME: ${{ needs.terraform.outputs.service_name }}
      TASK_FAMILY: ${{ needs.terraform.outputs.task_family }}
      CONTAINER_NAME: ${{ needs.terraform.outputs.container_name }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::304188066409:role/GitHubAction-Terraform-Role
          aws-region: ap-southeast-1

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Set Short SHA
        id: vars
        run: echo "sha_short=$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT

      - name: Build, tag, and push image to Amazon ECR
        id: build-image
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          ECR_REPOSITORY: "kelvin-cloud-project-repo"
          IMAGE_TAG: ${{ steps.vars.outputs.sha_short }}
        run: |
          docker build -t $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG ./app
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG
          echo "image=$ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG" >> $GITHUB_OUTPUT

      - name: Download Task Definition
        run: |
          aws ecs describe-task-definition --task-definition $TASK_FAMILY --query taskDefinition > task-definition.json

      - name: Fill in the new image ID in the Amazon ECS task definition
        id: task-def
        uses: aws-actions/amazon-ecs-render-task-definition@v1
        with:
          task-definition: task-definition.json
          container-name: ${{ needs.terraform.outputs.container_name }}
          image: ${{ steps.build-image.outputs.image }}

      - name: Deploy Amazon ECS task definition
        uses: aws-actions/amazon-ecs-deploy-task-definition@v1
        with:
          task-definition: ${{ steps.task-def.outputs.task-definition }}
          service: ${{ env.SERVICE_NAME }}
          cluster: ${{ env.CLUSTER_NAME }}
          wait-for-service-stability: true